{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-24 bg-white p-10 rounded-3xl shadow-2xl border border-gray-100 relative overflow-hidden">
    <div class="absolute -top-16 -right-16 w-32 h-32 bg-[#1a928d] rounded-full mix-blend-multiply filter blur-2xl opacity-10"></div>
    
    <div class="text-center mb-10 relative z-10">
        <div class="w-16 h-16 bg-gradient-to-br from-[#115b83] to-[#1a928d] rounded-2xl text-white flex items-center justify-center mx-auto mb-6 shadow-lg">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-3xl font-extrabold text-[#115b83]">Acceso Staff</h2>
        <p class="text-gray-500 mt-2 font-light">Gestión del Congreso</p>
    </div>

    {% if form.errors %}
        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-6 text-sm font-bold text-center">
            Usuario o contraseña incorrectos.
        </div>
    {% endif %}

    <form method="post" class="space-y-6 relative z-10">
        {% csrf_token %}
        <div>
            <label class="block text-[#115b83] font-bold mb-2 text-sm uppercase tracking-wide">Usuario</label>
            <input type="text" name="username" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:ring-0 focus:border-[#1a928d] outline-none transition-colors bg-gray-50 focus:bg-white" required>
        </div>
        <div>
            <label class="block text-[#115b83] font-bold mb-2 text-sm uppercase tracking-wide">Contraseña</label>
            <input type="password" name="password" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:ring-0 focus:border-[#1a928d] outline-none transition-colors bg-gray-50 focus:bg-white" required>
        </div>
        <button type="submit" class="w-full bg-[#115b83] hover:bg-[#0d4563] text-white font-bold py-4 px-4 rounded-xl shadow-lg transition duration-300 transform hover:-translate-y-1 mt-4">
            Iniciar Sesión
        </button>
    </form>
</div>
{% endblock %}
