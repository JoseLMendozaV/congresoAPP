{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center text-center px-4">
    <h1 class="text-9xl font-extrabold text-blue-600 tracking-widest">404</h1>
    <div class="bg-blue-600 px-2 text-sm rounded rotate-12 absolute text-white shadow-lg">
        Página no encontrada
    </div>
    <div class="mt-8">
        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">
            ¡Oops! Te has perdido en el congreso.
        </h2>
        <p class="text-gray-600 mb-8 max-w-md mx-auto">
            Lo sentimos, la página que estás buscando no existe, ha sido eliminada o cambiaste el enlace por accidente.
        </p>
        <a href="{% url 'inicio' %}" 
           class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg transition-colors duration-300">
            Volver a la página principal
        </a>
    </div>
</div>
{% endblock %}
